name: tests

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege default: these jobs only read the checked-out code
# and run tests/linters, so they never need a writable token - even
# though fork PRs run the PR author's install/build code.
permissions:
  contents: read

# Cancel in-progress runs when a new commit is pushed to the same
# pull request or branch, so a quick fix-up push doesn't keep an
# obsolete run burning a runner slot.
concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    # ruff is config-pinned to a single Python target, so a single
    # job is enough and keeps PR feedback fast.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -e ".[dev]"

      - run: python -m ruff check

      - run: python -m ruff format --check

  lint-js:
    # ESLint runs against the static web/ assets to catch obvious
    # typos and unused imports before a drive-by contributor opens
    # a PR. The dashboard has no build step, so a single Node
    # version is enough - pin to the active LTS.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - run: npm run lint

  test-js:
    # The dashboard's pure JS logic (range resolution, top-movers sort,
    # diff lookups, bar geometry, variant selection) is unit-tested with
    # Node's built-in runner - no Jest/Vitest, no jsdom. A drift guard also
    # asserts the vendored lit-html still matches the package.json pin. No
    # build step, so a single active-LTS Node is enough.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - run: npm test

  pytest:
    runs-on: ubuntu-latest
    strategy:
      # Don't bail on the whole matrix when one Python version
      # fails; the other version's result is still useful triage.
      fail-fast: false
      matrix:
        # Every version the package advertises in its pyproject
        # classifiers, end to end: the 3.10 lower bound matches the
        # README pledge, 3.12 is the version the daily refresh-metrics
        # cron runs on (so PRs test what generates production data), and
        # 3.13/3.14 are tested so a classifier never claims support that
        # CI has not actually exercised.
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - run: pip install -e ".[dev]"

      - run: python -m pytest tests
