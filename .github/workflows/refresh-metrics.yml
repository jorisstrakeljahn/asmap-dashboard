name: refresh-metrics

on:
  # Midnight UTC. GitHub schedules around the top of the hour can be
  # delayed during queue spikes; for a daily data refresh that is fine.
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Clone bitcoin-core/asmap-data
        run: git clone --depth=1 https://github.com/bitcoin-core/asmap-data.git /tmp/asmap-data

      - name: Generate metrics.json
        run: python -m asmap_dashboard metrics --data-dir /tmp/asmap-data --out web/assets/data/metrics.json

      - name: Refresh ASN names from bgp.tools
        # Non-fatal: if bgp.tools is unreachable we keep the previous
        # asn-names.json and still ship the refreshed metrics.json.
        continue-on-error: true
        run: |
          python -m asmap_dashboard refresh-asn-names \
            --metrics web/assets/data/metrics.json \
            --out web/assets/data/asn-names.json

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          PAYLOAD_FILES="web/assets/data/metrics.json web/assets/data/asn-names.json"
          if git diff --quiet -- $PAYLOAD_FILES; then
            echo "dashboard payloads unchanged, nothing to do"
            exit 0
          fi

          git add $PAYLOAD_FILES
          git commit -m "data: Refresh dashboard payloads"
          git push
