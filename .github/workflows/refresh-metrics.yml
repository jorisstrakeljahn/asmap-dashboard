name: refresh-metrics

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Clone bitcoin-core/asmap-data
        run: git clone --depth=1 https://github.com/bitcoin-core/asmap-data.git /tmp/asmap-data

      - name: Generate metrics.json
        run: python -m asmap_dashboard metrics --data-dir /tmp/asmap-data --out web/assets/data/metrics.json

      - name: Open and merge pull request if changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet web/assets/data/metrics.json; then
            echo "metrics.json unchanged, nothing to do"
            exit 0
          fi

          DATE=$(date -u +%Y-%m-%d)
          BRANCH="bot/refresh-metrics-${DATE}-${{ github.run_number }}"
          MAPS=$(python3 -c "import json; d=json.load(open('web/assets/data/metrics.json')); print(len(d['maps']))")
          DIFFS=$(python3 -c "import json; d=json.load(open('web/assets/data/metrics.json')); print(len(d['diffs']))")
          LATEST=$(python3 -c "import json; d=json.load(open('web/assets/data/metrics.json')); print(d['maps'][-1]['released_at'])")

          git checkout -b "$BRANCH"
          git add web/assets/data/metrics.json
          git commit -m "data: Refresh metrics.json"
          git push origin "$BRANCH"

          gh pr create \
            --title "data: Refresh metrics.json (${DATE})" \
            --body "Daily refresh from bitcoin-core/asmap-data. The regenerated payload covers ${MAPS} maps and ${DIFFS} all-pairs diffs, with the latest map released on ${LATEST}." \
            --base main \
            --head "$BRANCH"

          gh pr merge "$BRANCH" --rebase --delete-branch
