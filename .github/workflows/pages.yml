name: pages

# The dashboard's data layer is split along reproducibility lines:
#   - metrics.json + diffs.json: rebuilt fresh on every deploy from the
#     public bitcoin-core/asmap-data history; never committed.
#   - network.json: derived from KIT crawler dossiers that are not
#     public, so CI cannot regenerate it. It is small (~30 KB) and is
#     committed; the build deploys it as-is when present and the
#     Network tab simply stays hidden when it is absent.
#   - asn-names.json: rebuilt from bgp.tools, scoped to the ASNs the
#     other payloads reference.
# Triggers:
#   - push to main: redeploy when web/, the pipeline, or the workflow changes
#   - daily cron: pick up new asmap-data builds and ASN-name updates
#   - manual dispatch: ad-hoc rebuild
on:
  push:
    branches: [main]
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # Gate the deploy on the same fast checks the tests workflow runs.
  # Duplicating them here (rather than chaining via workflow_run) keeps
  # the cron and manual-dispatch paths gated too, because the gate runs
  # in the same workflow run as the deploy.
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -e ".[dev]"

      - run: python -m ruff check

      - run: python -m pytest tests

  build-and-deploy:
    needs: checks
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install asmap_dashboard
        run: pip install -e .

      - name: Clone bitcoin-core/asmap-data
        run: git clone --depth=1 https://github.com/bitcoin-core/asmap-data.git /tmp/asmap-data

      # Writes metrics.json (maps) and diffs.json next to it. The
      # committed network.json is left untouched: without --kit-dir /
      # --bitnodes-dir the pipeline produces no network section and
      # never writes (or deletes) the network payload.
      - name: Generate metrics.json + diffs.json
        run: |
          python -m asmap_dashboard metrics \
            --data-dir /tmp/asmap-data \
            --out web/assets/data/metrics.json

      - name: Refresh ASN names from bgp.tools
        # Non-fatal: if bgp.tools is unreachable we still ship the
        # payloads and the dashboard falls back to bare AS<num> labels.
        # network.json is listed even though it may not exist (public
        # deploys without the KIT preview); refresh-asn-names skips
        # missing files with a warning.
        continue-on-error: true
        run: |
          python -m asmap_dashboard refresh-asn-names \
            --payload web/assets/data/metrics.json \
                      web/assets/data/diffs.json \
                      web/assets/data/network.json \
            --out web/assets/data/asn-names.json

      # Guard against deploying an empty dashboard: an upstream layout
      # change makes map discovery return nothing without erroring, so
      # assert the generated payloads are non-empty before publishing.
      - name: Smoke-check generated payloads
        run: |
          jq -e '.maps | length > 0' web/assets/data/metrics.json > /dev/null
          jq -e '.schema_version' web/assets/data/metrics.json > /dev/null
          jq -e '.diffs | length >= 0' web/assets/data/diffs.json > /dev/null

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          path: web

      - id: deployment
        uses: actions/deploy-pages@v5
