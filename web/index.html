<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>ASmap Dashboard</title>
        <link rel="stylesheet" href="assets/css/tokens.css" />
        <link rel="stylesheet" href="assets/css/base.css" />
        <link rel="stylesheet" href="assets/css/layout.css" />
        <link rel="stylesheet" href="assets/css/dropdown.css" />
        <link rel="stylesheet" href="assets/css/overview.css" />
        <link rel="stylesheet" href="assets/css/charts.css" />
        <link rel="stylesheet" href="assets/css/diff-explorer.css" />
        <link rel="stylesheet" href="assets/css/top-movers.css" />
        <script type="module" src="assets/js/maps-tab.js"></script>
    </head>
    <body>
        <header class="site-header">
            <a class="site-header__logo" href="./">ASmap Dashboard</a>
            <nav class="site-header__nav" aria-label="Primary">
                <a class="site-header__nav-link is-active" href="#" aria-current="page">Maps</a>
            </nav>
            <span class="site-header__meta" data-last-build></span>
        </header>

        <main class="content">
            <section class="section" aria-labelledby="overview-title">
                <header class="section__header">
                    <div class="section__heading">
                        <h2 id="overview-title" class="section__title">Overview</h2>
                        <p class="section__lede">
                            Key metrics for the selected ASmap build
                        </p>
                    </div>
                    <div class="section__aside" data-build-selector></div>
                </header>
                <div class="section__body" data-overview></div>
                <div class="section__body" data-map-size-chart></div>
                <div class="section__body" data-map-delta-chart></div>
            </section>

            <section class="section" aria-labelledby="diff-title">
                <h2 id="diff-title" class="section__title">Diff Explorer</h2>
                <p class="section__lede">Compare any two ASmap builds</p>
                <div class="section__body" data-diff></div>
            </section>
        </main>

        <footer class="site-footer">
            <div class="site-footer__inner">
                <p class="site-footer__sources">
                    Data sourced from
                    <a href="https://github.com/bitcoin-core/asmap-data" rel="noopener noreferrer" target="_blank">bitcoin-core/asmap-data</a>.
                    ASN labels from
                    <a href="https://bgp.tools" rel="noopener noreferrer" target="_blank">bgp.tools</a>.
                </p>
                <p class="site-footer__meta">
                    <a href="https://github.com/jorisstrakeljahn/asmap-dashboard" rel="noopener noreferrer" target="_blank">Source on GitHub</a>
                </p>
                <p class="site-footer__meta" data-last-refreshed hidden></p>
            </div>
        </footer>
    </body>
</html>
